    <style>
        .grid {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            pointer-events: none
        }

        .grid.off--ready .grid__line {
            transform: scaleY(1)
        }

        .grid.off--ready .grid__logo {
            opacity: 1;
            transform: translate(-50%, -50%)
        }

        .grid.off .grid__fill {
            transform: scaleX(0)
        }

        .grid.off .grid__logo {
            opacity: 0;
            transform: translate(-50%, -70%);
            transition-delay: .1s
        }

        .grid__logo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 250px;
            height: 250px;
            transform: translate(-50%, -40%);
            opacity: 0;
            z-index: 50;
            transition: all .4s;
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            background-image: url(./../images/svg/logo.svg)
        }

        .grid__col {
            position: relative;
            width: 25%;
            flex-basis: 25%;
            height: 100%
        }

        .grid__col:nth-child(2) .grid__fill {
            transition-delay: .1s
        }

        .grid__col:nth-child(2) .grid__line {
            transition-delay: .1s
        }

        .grid__col:nth-child(3) .grid__fill {
            transition-delay: .2s
        }

        .grid__col:nth-child(3) .grid__line {
            transition-delay: .2s
        }

        .grid__col:nth-child(4) .grid__fill {
            transition-delay: .3s
        }

        .grid__col:nth-child(4) .grid__line {
            transition-delay: .3s
        }

        .grid__col:nth-child(5) .grid__fill {
            transition-delay: .4s
        }

        .grid__col:nth-child(5) .grid__line {
            transition-delay: .4s
        }

        .grid__fill {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: #1A1818;
            transform-origin: center right;
            transition: all .4s cubic-bezier(0.42, 0, 1, 1)
        }

        .grid__line {
            position: absolute;
            right: 0;
            width: 1px;
            height: 100%;
            background-color: rgba(74, 74, 74, 0.1);
            transform: scaleY(0);
            transform-origin: center top;
            transition: all .5s cubic-bezier(0.42, 0, 1, 1)
        }

        .vs-section {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            width: 100%;
            height: auto;
            margin: auto;
            will-change: transform
        }

        .touch .vs-section {
            position: static
        }

        .is-virtual-scroll {
            overflow: hidden
        }

        .is-native-scroll.y-scroll {
            overflow-y: scroll;
            overflow-x: hidden
        }

        .is-native-scroll.x-scroll {
            overflow-y: hidden;
            overflow-x: scroll
        }

        .vs-scrollbar {
            display: block;
            position: absolute;
            transition: transform .6s
        }

        .vs-scrollbar.vs-vertical {
            top: 0;
            right: -5px;
            bottom: 0;
            width: 15px;
            height: 100%;
            transform: translate3d(5px, 0, 0)
        }

        .vs-scrollbar.vs-horizontal {
            bottom: -5px;
            left: 0;
            right: 0;
            width: 100%;
            height: 15px;
            transform: translate3d(0, 5px, 0)
        }

        .is-dragging .vs-scrollbar.vs-horizontal,
        .is-dragging .vs-scrollbar.vs-vertical,
        .vs-scrollbar.vs-horizontal:hover,
        .vs-scrollbar.vs-vertical:hover {
            transform: none
        }

        .vs-scrollbar .vs-scrolldrag {
            width: 100%;
            height: auto;
            background: #ccc;
            cursor: pointer
        }

        .vs-scroll-view {
            position: relative;
            width: 1px
        }

        .cookie {
            display: none
        }


        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
